name: Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./Front_Eval3
          push: true
          tags: baskhor/eval3-frontend:latest

      - name: Build and Push Backend Node
        uses: docker/build-push-action@v4
        with:
          context: ./backJs_Eval3
          push: true
          tags: baskhor/eval3-backend-node:latest

      - name: Build and Push Backend Python
        uses: docker/build-push-action@v4
        with:
          context: ./BackPy_Eval3
          push: true
          tags: baskhor/eval3-backend-python:latest

      - name: Verify Images
        run: |
          echo "✅ All images built and pushed successfully!"
          echo "Frontend: baskhor/eval3-frontend:latest"
          echo "Backend Node: baskhor/eval3-backend-node:latest"
          echo "Backend Python: baskhor/eval3-backend-python:latest"
